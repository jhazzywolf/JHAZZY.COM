<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <header class="site-header">
        <div class="logo"><h2>JHAZZY WOLF</h2></div>

            <a href="press.html">PRESS</a>
            <a href="book.html">BOOK ME</a>

    </header>

    <main class="hero-section">
        <div class="video-background">
            <iframe src="https://player.vimeo.com/video/1120658702?background=1&autoplay=1&loop=1&byline=0&title=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>

        <div id="wolf-companion">
