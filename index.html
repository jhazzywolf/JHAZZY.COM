<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhazzy Wolf | Official Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="logo">
            <h2>JHAZZY WOLF</h2>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="active">HOME</a>
            <a href="music.html">MUSIC</a>
            <a href="about.html">ABOUT</a>
            <a href="press.html">PRESS</a>
            <a href="book.html">BOOK ME</a>
        </nav>
    </header>

    <main class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">JHAZZY WOLF</h1>
            <p class="hero-subtitle">INDEPENDENT ARTIST • DENVER, CO</p>
            <a href="music.html" class="stream-cta">STREAM CATALOG</a>
        </div>
    </main>

    <section class="home-nav-tabs">
        <a href="music.html" class="nav-tab"><h3>MUSIC</h3><p>Catalog & Visuals</p></a>
        <a href="about.html" class="nav-tab"><h3>ABOUT</h3><p>The story</p></a>
        <a href="press.html" class="nav-tab"><h3>PRESS</h3><p>Media Archive</p></a>
        <a href="book.html" class="nav-tab"><h3>BOOK ME</h3><p>Inquiries</p></a>
    </section>

    <div id="pet-wolf-container">
        <div id="wolf-speech-bubble">
            <div class="bubble-tail"></div>
            <p id="wolf-dialogue">What's good? Ask me about my music or upcoming shows.</p>
            <div class="wolf-actions">
                <button class="action-chip" data-action="music">🎵 Play Music</button>
                <button class="action-chip" data-action="trick">🐺 Do a Trick</button>
            </div>
            <div class="wolf-input-area">
                <input type="text" id="wolf-talk-input" placeholder="Talk to the wolf...">
                <button id="wolf-talk-send">❯</button>
            </div>
        </div>
        <div id="wolf-companion">
            <svg class="wolf-vector" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,10 80,40 90,80 50,95 10,80 20,40" fill="#111" stroke="#fff" stroke-width="2"/>
                <circle cx="35" cy="50" r="3" fill="#fff" />
                <circle cx="65" cy="50" r="3" fill="#fff" />
            </svg>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
