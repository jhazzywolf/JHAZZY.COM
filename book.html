<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhazzy Wolf | Book Me</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

    <header class="site-header" style="position: relative; background: #050505;">
        <div class="logo">
            <h2>JHAZZY WOLF</h2>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="music.html">Music</a>
            <a href="about.html">About</a>
            <a href="press.html">Press</a>
            <a href="book.html" class="active">Book Me</a>
        </nav>
    </header>

    <section class="page-header">
        <h1 class="section-title">BOOKING & INQUIRIES</h1>
    </section>

    <main class="text-page-wrapper" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;">
        
        <div class="text-content-box" style="background: transparent; border: none; padding: 0;">
            <h3 style="margin-bottom: 20px;">SERVICES</h3>
            <ul style="list-style: none; line-height: 2.5; color: #ccc;">
                <li style="border-bottom: 1px solid #222;"><strong>Live Performances</strong></li>
                <li style="border-bottom: 1px solid #222;"><strong>Event Hosting</strong></li>
                <li style="border-bottom: 1px solid #222;"><strong>Brand Collaborations</strong></li>
                <li style="border-bottom: 1px solid #222;"><strong>Wolf Wednesdays Partnerships</strong></li>
            </ul>
        </div>

        <div class="text-content-box">
            <form action="mailto:contact@jhazzy.com" method="post" enctype="text/plain" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" placeholder="Name / Company" style="padding: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Inter';" required>
                <input type="email" placeholder="Email" style="padding: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Inter';" required>
                <select style="padding: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Inter';">
                    <option>Live Performance</option>
                    <option>Event Hosting</option>
                    <option>General Inquiry</option>
                </select>
                <textarea placeholder="Event details, budget, dates..." rows="4" style="padding: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Inter';" required></textarea>
                <button type="submit" class="action-chip" style="width: 100%; padding: 15px; font-size: 1rem;">SEND INQUIRY</button>
            </form>
        </div>

    </main>

    <div id="pet-wolf-container">
        <div id="wolf-speech-bubble">
            <div class="bubble-tail"></div>
            <p id="wolf-dialogue">What's good? Give me a command or ask me a question.</p>
            <div class="wolf-actions">
                <button class="action-chip" data-action="music">🎵 Play Music</button>
                <button class="action-chip" data-action="trick">🐺 Do a Trick</button>
            </div>
            <div class="wolf-input-area">
                <input type="text" id="wolf-talk-input" placeholder="Talk to the wolf...">
                <button id="wolf-talk-send">❯</button>
            </div>
        </div>
        <div id="wolf-companion">
            <svg class="wolf-vector" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,10 80,40 90,80 50,95 10,80 20,40" fill="#111" stroke="#fff" stroke-width="2"/>
                <circle cx="35" cy="50" r="3" fill="#fff" />
                <circle cx="65" cy="50" r="3" fill="#fff" />
            </svg>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
