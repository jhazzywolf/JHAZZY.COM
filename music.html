<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhazzy Wolf | Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header" style="position: relative; background: #050505;">
        <div class="logo">
            <h2>JHAZZY WOLF</h2>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="music.html" class="active">Music</a>
            <a href="about.html">About</a>
            <a href="press.html">Press</a>
            <a href="book.html">Book Me</a>
        </nav>
    </header>

    <section class="page-header">
        <h1 class="section-title">THE MUSIC</h1>
    </section>

    <section class="music-grid">
        <h2 style="grid-column: 1 / -1; margin-bottom: 20px;">SONGS & EPS</h2>
        <div class="track-card">
            <div class="release-art">ART HERE</div>
            <div class="track-info">
                <br>
                <h3>NAUGHTY</h3>
                <p>2023</p>
                <a href="#" class="cta-button" style="padding: 10px 20px; font-size: 0.8rem;">PLAY NOW</a>
            </div>
        </div>
        <div class="track-card">
            <div class="release-art">ART HERE</div>
            <div class="track-info">
                <br>
                <h3>BEAUTIFUL NIGHTMARE</h3>
                <p>2023</p>
                <a href="#" class="cta-button" style="padding: 10px 20px; font-size: 0.8rem;">PLAY NOW</a>
            </div>
        </div>
    </section>

    <section class="music-grid" style="padding-top: 20px;">
        <h2 style="grid-column: 1 / -1; margin-bottom: 20px;">FEATURES</h2>
        <div class="track-card">
            <div class="track-info" style="text-align: left;">
                <h3>STACC IT UP</h3>
                <p>K$TACC$ ft. Jhazzy Wolf</p>
                <a href="#" class="cta-button" style="padding: 10px 20px; font-size: 0.8rem;">LISTEN</a>
            </div>
        </div>
        <div class="track-card">
            <div class="track-info" style="text-align: left;">
                <h3>MY CITY</h3>
                <p>DNA PICASSO ft. Jhazzy Wolf</p>
                <a href="#" class="cta-button" style="padding: 10px 20px; font-size: 0.8rem;">LISTEN</a>
            </div>
        </div>
    </section>

    <section class="visuals-section">
        <h2 class="section-title" style="margin-top: 40px;">VISUALS</h2>
        <div class="video-grid">
            <div class="video-wrapper">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/mKqpqi1QaNw?rel=0&modestbranding=1" title="Beautiful Nightmare" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="video-wrapper">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/ot4hyOswdqA?rel=0&modestbranding=1" title="Doubt It" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <div id="wolf-companion">
        <svg class="wolf-vector" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,10 80,40 90,80 50,95 10,80 20,40" fill="#111" stroke="#fff" stroke-width="2"/>
            <circle cx="35" cy="50" r="3" fill="#fff" />
            <circle cx="65" cy="50" r="3" fill="#fff" />
        </svg>
    </div>
    <div id="wolf-chat-ui" class="hidden">
        <div class="chat-header">JHAZZY'S WOLF</div>
        <div class="chat-body" id="chat-body"><div class="chat-msg wolf-msg">What's up?</div></div>
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Ask me something...">
            <button id="chat-send">SEND</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
